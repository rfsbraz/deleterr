name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the information below to help us investigate.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Configure settings.yaml with...
        2. Run deleterr with...
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Relevant parts of your `settings.yaml` (remove sensitive data like API keys)
      render: yaml

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant log output (set `LOG_LEVEL=DEBUG` for more detail)
      render: text

  - type: input
    id: version
    attributes:
      label: Deleterr Version
      description: Version or Docker image tag
      placeholder: e.g., v0.2.10, edge, latest
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment Method
      options:
        - Docker
        - Docker Compose
        - Native Python
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g., Ubuntu 22.04, Windows 11, macOS 14
    validations:
      required: true
